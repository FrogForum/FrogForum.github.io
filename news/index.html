<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>/news/ - FrogForum</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:#c8ffc8;
    font-family:Verdana, Arial, sans-serif;
    font-size:14px;
}

a{
    color:#6dff6d;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* HEADER */
header{
    background:#1f3d1f;
    padding:15px;
    border-bottom:3px solid #3fae3f;
}

header h1{
    margin:0;
    color:#bfffbf;
}

/* NAV */
nav{
    background:#101010;
    padding:10px;
    border-bottom:2px solid #2f7f2f;
}

nav a{
    margin-right:10px;
    font-weight:bold;
}

/* LAYOUT */
.container{
    width:900px;
    max-width:95%;
    margin:20px auto;
}

/* BOX */
.box{
    background:#151515;
    border:1px solid #2f7f2f;
    margin-bottom:15px;
}

.box-title{
    background:#2f7f2f;
    padding:8px;
    color:white;
    font-weight:bold;
}

.box-content{
    padding:10px;
}

/* INPUTS */
input, textarea{
    width:100%;
    background:#0f0f0f;
    color:#c8ffc8;
    border:1px solid #2f7f2f;
    padding:8px;
    margin-bottom:10px;
    font-family:Verdana;
}

button{
    background:#2f7f2f;
    border:1px solid #55cc55;
    color:white;
    padding:8px 15px;
    cursor:pointer;
}

button:hover{
    background:#3faa3f;
}

/* POST */
.post{
    border-left:4px solid #5fd65f;
    padding:10px;
    margin:10px 0;
    background:#101010;
}

.post-title{
    font-weight:bold;
    color:#aaffaa;
}

.small{
    font-size:12px;
    color:#88bb88;
}
</style>

</head>

<body>

<header>
<h1> /news/</h1>
<div class="small">FrogForum News Board</div>
</header>

<nav>
<a href="/">Home</a>
<a href="/news/">News</a>
<a href="/games/">Games</a>
<a href="/learn/">Learn</a>
<a href="/memes/">Memes</a>
<a href="/chat/">Chat</a>
</nav>

<div class="container">

<!-- CREATE POST -->
<div class="box">
<div class="box-title">Create News Post</div>
<div class="box-content">

<input type="text" id="title" placeholder="Post title">
<textarea id="content" rows="4" placeholder="Write your news..."></textarea>

<button onclick="addPost()">Post</button>

<div class="small">Note: Posts are temporary (frontend only)</div>

</div>
</div>

<!-- POSTS -->
<div class="box">
<div class="box-title">Latest News</div>
<div class="box-content" id="posts">

<div class="post">
<div class="post-title">Welcome to FrogForum News</div>
<div class="small">system • just now</div>
<p>This is the first test post on /news/ </p>
</div>

</div>
</div>

</div>

<script>
function addPost(){
    let title = document.getElementById("title").value;
    let content = document.getElementById("content").value;

    if(title === "" || content === ""){
        alert("Fill in both fields!");
        return;
    }

    let post = document.createElement("div");
    post.className = "post";

    post.innerHTML = `
        <div class="post-title">${title}</div>
        <div class="small">anonymous • just now</div>
        <p>${content}</p>
    `;

    document.getElementById("posts").prepend(post);

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
}
</script>

</body>
</html>
